<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nav Transition Preview</title>
  <style>
    :root {
      --ti-600: #354997;
      --ti-700: #283671;
      --ti-800: #1b244b;
      --ti-300: #8e9cd7;
      --apricot-400: #f7c23b;
      --page-bg: #edf3f8; /* blue-grey-50 */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, sans-serif;
      background: #d8e4ee;
      display: flex;
      flex-direction: column;
      gap: 32px;
      padding: 32px 16px;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: -16px;
      padding: 0 4px;
    }

    /* ── shared nav chrome ── */
    .preview {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
    }

    nav {
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .left { display: flex; align-items: center; gap: 12px; }

    .logo {
      width: 40px; height: 40px;
      background: var(--apricot-400);
      border-radius: 10px;
      outline: 1.5px solid var(--apricot-400);
    }

    .page-title {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
    }

    .chevron {
      width: 16px; height: 16px;
      border-right: 2px solid var(--ti-300);
      border-bottom: 2px solid var(--ti-300);
      transform: rotate(45deg) translateY(-3px);
      display: inline-block;
      margin-left: 2px;
    }

    .baby-pill {
      font-size: 13px;
      font-weight: 500;
      color: #d9def2;
      background: var(--ti-800);
      padding: 4px 12px;
      border-radius: 999px;
    }

    .page-content {
      background: var(--page-bg);
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      height: 48px;
      border: 1px solid #dbe7f0;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      color: #6e9dc4;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 6px;
    }

    /* ── Option A: shadow only ── */
    .a nav {
      background: var(--ti-700);
      box-shadow: 0 4px 12px rgba(0,0,0,.22);
    }

    /* ── Option B: white/10 border ── */
    .b nav {
      background: var(--ti-700);
      border-bottom: 1px solid rgba(255,255,255,.12);
    }

    /* ── Option C: gradient + white/10 border ── */
    .c nav {
      background: linear-gradient(to bottom, var(--ti-700), var(--ti-600));
      border-bottom: 1px solid rgba(255,255,255,.10);
    }

    /* ── Option D: gradient + shadow ── */
    .d nav {
      background: linear-gradient(to bottom, var(--ti-700), var(--ti-600));
      box-shadow: 0 4px 16px rgba(0,0,0,.20);
    }

    /* ── Option E: gradient all the way to page bg ── */
    .e {
      border-radius: 16px;
      overflow: visible !important;
      position: relative;
    }
    .e nav {
      background: var(--ti-700);
      border-bottom: none;
      border-radius: 16px 16px 0 0;
    }
    .e .fade-strip {
      height: 28px;
      background: linear-gradient(to bottom, var(--ti-700), var(--page-bg));
    }
    .e .page-content {
      padding-top: 8px;
      border-radius: 0 0 16px 16px;
    }
  </style>
</head>
<body>

  <h1>A — Shadow only (no border line)</h1>
  <div class="preview a">
    <nav>
      <div class="left">
        <div class="logo"></div>
        <span class="page-title">Tracking <span class="chevron"></span></span>
      </div>
      <span class="baby-pill">Emma</span>
    </nav>
    <div class="page-content">
      <div class="card"></div>
      <div class="card"></div>
    </div>
  </div>

  <h1>B — Subtle white border (barely visible line)</h1>
  <div class="preview b">
    <nav>
      <div class="left">
        <div class="logo"></div>
        <span class="page-title">Tracking <span class="chevron"></span></span>
      </div>
      <span class="baby-pill">Emma</span>
    </nav>
    <div class="page-content">
      <div class="card"></div>
      <div class="card"></div>
    </div>
  </div>

  <h1>C — Gradient bottom + subtle white border</h1>
  <div class="preview c">
    <nav>
      <div class="left">
        <div class="logo"></div>
        <span class="page-title">Tracking <span class="chevron"></span></span>
      </div>
      <span class="baby-pill">Emma</span>
    </nav>
    <div class="page-content">
      <div class="card"></div>
      <div class="card"></div>
    </div>
  </div>

  <h1>D — Gradient bottom + shadow (no line at all)</h1>
  <div class="preview d">
    <nav>
      <div class="left">
        <div class="logo"></div>
        <span class="page-title">Tracking <span class="chevron"></span></span>
      </div>
      <span class="baby-pill">Emma</span>
    </nav>
    <div class="page-content">
      <div class="card"></div>
      <div class="card"></div>
    </div>
  </div>

  <h1>E — Gradient dissolves fully into page background</h1>
  <div class="preview e">
    <nav>
      <div class="left">
        <div class="logo"></div>
        <span class="page-title">Tracking <span class="chevron"></span></span>
      </div>
      <span class="baby-pill">Emma</span>
    </nav>
    <div class="fade-strip"></div>
    <div class="page-content">
      <div class="card"></div>
      <div class="card"></div>
    </div>
  </div>

</body>
</html>
